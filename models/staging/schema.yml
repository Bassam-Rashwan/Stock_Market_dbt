  - name: stg_macro__cot
    description: >
      Cleaned and standardized COT report data. One row per market per report date.
      No business logic — just types cast and columns renamed for clarity.
    config:
      contract:
        enforced: true
    columns:
      - name: cot_sk
        data_type: varchar
        description: Surrogate key on market_name + report_date
        data_tests:
          - not_null
          - unique

      - name: market_name
        data_type: varchar
        description: Name of the market or exchange
        data_tests:
          - not_null

      - name: report_date
        data_type: date
        description: Date of the COT report
        data_tests:
          - not_null

      - name: commercial_long
        data_type: bigint
        description: Total long positions held by commercial traders

      - name: commercial_short
        data_type: bigint
        description: Total short positions held by commercial traders

      - name: commercial_net
        data_type: bigint
        description: Net position of commercial traders (long minus short)

      - name: noncommercial_long
        data_type: bigint
        description: Total long positions held by non-commercial traders (speculators)

      - name: noncommercial_short
        data_type: bigint
        description: Total short positions held by non-commercial traders (speculators)

      - name: noncommercial_net
        data_type: bigint
        description: Net position of non-commercial traders (long minus short)

      - name: nonreportable_long
        data_type: bigint
        description: Total long positions held by non-reportable traders (small traders)

      - name: nonreportable_short
        data_type: bigint
        description: Total short positions held by non-reportable traders (small traders)

      - name: nonreportable_net
        data_type: bigint
        description: Net position of non-reportable traders (long minus short)

      - name: open_interest
        data_type: bigint
        description: Total open interest for the market

      - name: loaded_at
        data_type: timestamp
        description: Timestamp when this record was staged      