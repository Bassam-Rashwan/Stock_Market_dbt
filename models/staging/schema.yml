version: 2

models:
  - name: stg_market__ohlc_prices
    description: >
      Cleaned and renamed OHLC price data. One row per ticker per trading day.
      No business logic — types cast and columns standardized only.
    config:
      contract:
        enforced: true
    columns:
      - name: ohlc_sk
        data_type: varchar
        description: Surrogate key on ticker + trade_date
        data_tests:
          - not_null
          - unique

      - name: ticker
        data_type: varchar
        description: Stock ticker symbol
        data_tests:
          - not_null

      - name: trade_date
        data_type: date
        description: Trading date
        data_tests:
          - not_null

      - name: open
        data_type: numeric
        description: Opening price

      - name: high
        data_type: numeric
        description: Daily high price

      - name: low
        data_type: numeric
        description: Daily low price

      - name: close
        data_type: numeric
        description: Closing price
        data_tests:
          - not_null

      - name: adj_close
        data_type: numeric
        description: Split and dividend adjusted closing price

      - name: volume
        data_type: bigint
        description: Daily trading volume

      - name: loaded_at
        data_type: timestamp
        description: Timestamp when this record was staged



  - name: stg_finance__fundamentals
    description: >
      Cleaned long-format fundamentals data. One row per ticker, metric, fiscal_date, and period_type.
      No pivoting or derived business logic here.
    config:
      contract:
        enforced: true
    columns:
      - name: ticker
        data_type: varchar
        description: Stock ticker symbol
        data_tests:
          - not_null

      - name: metric_name
        data_type: varchar
        description: Standardized metric name
        data_tests:
          - not_null

      - name: period_type
        data_type: varchar
        description: Reporting period type such as quarterly or annual
        data_tests:
          - not_null

      - name: fiscal_date
        data_type: date
        description: Fiscal reporting date
        data_tests:
          - not_null

      - name: value
        data_type: numeric
        description: Raw metric value
        data_tests:
          - not_null

      - name: loaded_at
        data_type: timestamp
        description: Timestamp when staged

      - name: source
        data_type: varchar
        description: Source system label

