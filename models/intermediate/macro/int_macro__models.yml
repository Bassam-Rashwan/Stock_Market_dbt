              arguments:
                values: ['equity_index', 'fx', 'rates', 'commodity']
      - name: cot_market_code
        data_type: varchar
        description: Standardized internal market code for downstream macro analysis.
        data_tests:
          - not_null

      - name: commercial_long
        data_type: bigint
        description: Commercial trader long positions.

      - name: commercial_short
        data_type: bigint
        description: Commercial trader short positions.

      - name: commercial_net
        data_type: bigint
        description: Net commercial positioning calculated as commercial long minus commercial short.

      - name: noncommercial_long
        data_type: bigint
        description: Non-commercial trader long positions.

      - name: noncommercial_short
        data_type: bigint
        description: Non-commercial trader short positions.

      - name: noncommercial_net
        data_type: bigint
        description: Net non-commercial positioning calculated as non-commercial long minus non-commercial short.

      - name: nonreportable_long
        data_type: bigint
        description: Non-reportable trader long positions.

      - name: nonreportable_short
        data_type: bigint
        description: Non-reportable trader short positions.

      - name: nonreportable_net
        data_type: bigint
        description: Net non-reportable positioning calculated as non-reportable long minus non-reportable short.

      - name: open_interest
        data_type: bigint
        description: Total open interest for the market on the report date.

      - name: commercial_long_pct_oi
        data_type: float
        description: Commercial long positions as a share of open interest.

      - name: commercial_short_pct_oi
        data_type: float
        description: Commercial short positions as a share of open interest.

      - name: commercial_net_pct_oi
        data_type: float
        description: Commercial net positioning as a share of open interest.

      - name: noncommercial_long_pct_oi
        data_type: float
        description: Non-commercial long positions as a share of open interest.

      - name: noncommercial_short_pct_oi
        data_type: float
        description: Non-commercial short positions as a share of open interest.

      - name: noncommercial_net_pct_oi
        data_type: float
        description: Non-commercial net positioning as a share of open interest.

      - name: nonreportable_long_pct_oi
        data_type: float
        description: Non-reportable long positions as a share of open interest.

      - name: nonreportable_short_pct_oi
        data_type: float
        description: Non-reportable short positions as a share of open interest.

      - name: nonreportable_net_pct_oi
        data_type: float
        description: Non-reportable net positioning as a share of open interest.

      - name: commercial_net_wow_change
        data_type: bigint
        description: Week-over-week change in commercial net positioning.

      - name: noncommercial_net_wow_change
        data_type: bigint
        description: Week-over-week change in non-commercial net positioning.

      - name: nonreportable_net_wow_change
        data_type: bigint
        description: Week-over-week change in non-reportable net positioning.

      - name: commercial_net_pct_oi_wow_change
        data_type: float
        description: Week-over-week change in commercial net positioning as a share of open interest.

      - name: noncommercial_net_pct_oi_wow_change
        data_type: float
        description: Week-over-week change in non-commercial net positioning as a share of open interest.

      - name: nonreportable_net_pct_oi_wow_change
        data_type: float
        description: Week-over-week change in non-reportable net positioning as a share of open interest.

      - name: spec_vs_hedger_net_spread
        data_type: bigint
        description: Difference between non-commercial net positioning and commercial net positioning.

      - name: spec_vs_hedger_net_spread_pct_oi
        data_type: float
        description: Difference between non-commercial and commercial net positioning as a share of open interest.

      - name: noncommercial_directional_bias_pct_oi
        data_type: float
        description: Non-commercial directional bias measured as long percentage of open interest minus short percentage of open interest.

      - name: commercial_directional_bias_pct_oi
        data_type: float
        description: Commercial directional bias measured as long percentage of open interest minus short percentage of open interest.

      - name: open_interest_wow_change
        data_type: bigint
        description: Week-over-week change in total open interest.

      - name: open_interest_wow_pct_change
        data_type: float
        description: Week-over-week percentage change in total open interest.

      - name: loaded_at
        data_type: timestamp
        description: Timestamp when the record was loaded from the staging model.




