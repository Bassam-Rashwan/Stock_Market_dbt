version: 2

models:


  - name: int_macro__cot_markets
    description: >
      Intermediate COT market classification model built from staged COT data.
      Standardizes market names, assigns each selected market to a high-level
      asset class, maps markets to internal market codes, and filters out
      unsupported contracts.

    config:
      contract:
        enforced: true

    columns:
      - name: cot_sk
        data_type: varchar
        description: Surrogate key for the COT market and report date combination.
        data_tests:
          - not_null
          - unique

      - name: market_name
        data_type: varchar
        description: Standardized COT market and exchange name in uppercase trimmed format.
        data_tests:
          - not_null

      - name: report_date
        data_type: date
        description: Weekly COT report date.
        data_tests:
          - not_null

      - name: commercial_long
        data_type: bigint
        description: Commercial trader long positions.

      - name: commercial_short
        data_type: bigint
        description: Commercial trader short positions.

      - name: commercial_net
        data_type: bigint
        description: Net commercial positioning calculated as commercial long minus commercial short.

      - name: noncommercial_long
        data_type: bigint
        description: Non-commercial trader long positions.

      - name: noncommercial_short
        data_type: bigint
        description: Non-commercial trader short positions.

      - name: noncommercial_net
        data_type: bigint
        description: Net non-commercial positioning calculated as non-commercial long minus non-commercial short.

      - name: nonreportable_long
        data_type: bigint
        description: Non-reportable trader long positions.

      - name: nonreportable_short
        data_type: bigint
        description: Non-reportable trader short positions.

      - name: nonreportable_net
        data_type: bigint
        description: Net non-reportable positioning calculated as non-reportable long minus non-reportable short.

      - name: open_interest
        data_type: bigint
        description: Total open interest for the market on the report date.

      - name: cot_asset_class
        data_type: varchar
        description: High-level asset class assigned to the COT market.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['equity_index', 'fx', 'rates', 'commodity']

      - name: cot_market_code
        data_type: varchar
        description: Standardized internal market code for downstream macro analysis.
        data_tests:
          - not_null

      - name: loaded_at
        data_type: timestamp
        description: Timestamp when the record was loaded from the staging model.





  - name: int_macro__cot_positioning
    description: >
      Intermediate COT positioning model built from staged weekly COT data.
      Adds normalized positioning metrics, cross-group spreads, and week-over-week
      changes for commercial, non-commercial, and non-reportable trader groups.

