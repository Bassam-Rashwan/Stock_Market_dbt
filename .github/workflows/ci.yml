# .github/workflows/ci.yml
name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-postgres

      - name: Install dependencies
        run: dbt deps

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          quant:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                user: postgres
                password: postgres
                port: 5432
                dbname: dbt_ci
                schema: quant
                threads: 4
          EOF


      - name: Debug connection
        run: dbt debug

      - name: Run dbt build
        run: dbt build